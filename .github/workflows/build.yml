name: Build CrystalSpKMacro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload CrystalSpKMacro.exe
        uses: actions/upload-artifact@v4
        with:
          name: CrystalSpKMacro
          path: build/Release/CrystalSpKMacro.exe
          if-no-files-found: error
